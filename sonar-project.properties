sonar.projectKey=steadybit_extension-host-windows
sonar.organization=steadybit

sonar.sources=.
sonar.exclusions=**/*_test.go,**/e2e/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out,e2e/e2e-coverage.out

sonar.issue.ignore.multicriteria=test
sonar.issue.ignore.multicriteria.test.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.test.resourceKey=**/*_test.go
