project_name: steadybit-extension-host-windows
version: 2

git:
  ignore_tags:
    - steadybit-extension-host-windows-*

builds:
  - binary: extension-host-windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -cover={{ if index .Env "BUILD_WITH_COVERAGE"  }}{{ .Env.BUILD_WITH_COVERAGE }}{{ else }}false{{ end }}
      - -covermode=atomic
    ldflags:
      - -s -w
      - -X github.com/steadybit/extension-kit/extbuild.ExtensionName={{.ProjectName}}
      - -X github.com/steadybit/extension-kit/extbuild.Version={{.Version}}
      - -X github.com/steadybit/extension-kit/extbuild.Revision={{.Commit}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Arch }}"
    formats: ["zip"]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-{{ .CommitTimestamp }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
